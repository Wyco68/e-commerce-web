# Render Blueprint — SQLite demo + Upstash Redis + Pusher
# Docs: docs/UPSTASH-PUSHER.md

services:
  - type: web
    name: carpart
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /up
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeploy: true
    envVars:
      - key: APP_NAME
        value: CarPart
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_DEMO_MODE
        value: "true"
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /var/www/html/database/database.sqlite
      - key: REDIS_CLIENT
        value: predis
      - key: REDIS_URL
        sync: false
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_STORE
        value: file
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: SESSION_ENCRYPT
        value: "true"
      - key: TRUSTED_PROXIES
        value: "*"
      - key: RENDER
        value: "true"
      - key: QUEUE_CONNECTION
        value: sync
      - key: BROADCAST_CONNECTION
        value: pusher
      - key: PUSHER_APP_ID
        sync: false
      - key: PUSHER_APP_KEY
        sync: false
      - key: PUSHER_APP_SECRET
        sync: false
      - key: PUSHER_APP_CLUSTER
        sync: false
      - key: PUSHER_SCHEME
        value: https
      - key: PUSHER_PORT
        value: "443"
      - key: VITE_PUSHER_APP_KEY
        sync: false
      - key: VITE_PUSHER_APP_CLUSTER
        sync: false
      - key: VITE_PUSHER_SCHEME
        value: https
      - key: FILESYSTEM_DISK
        value: local
      - key: MAIL_MAILER
        value: log
